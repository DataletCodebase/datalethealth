version: "3.1"

recipe: default.v1
language: en

assistant_id: smart-diet-assistant-pro

pipeline:
  # ================= TOKENIZATION =================
  - name: WhitespaceTokenizer

  # ================= FEATURE ENGINEERING =================
  - name: RegexFeaturizer

  - name: LexicalSyntacticFeaturizer

  # WORD LEVEL
  - name: CountVectorsFeaturizer

  # CHARACTER LEVEL (VERY IMPORTANT FOR TYPOS)
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 5

  # ================= MAIN INTENT CLASSIFIER =================
  - name: DIETClassifier
    epochs: 200
    learning_rate: 0.001
    constrain_similarities: true

  # ================= ENTITY HANDLING =================
  - name: EntitySynonymMapper

  # ================= FALLBACK (VERY IMPORTANT) =================
  - name: FallbackClassifier
    threshold: 0.45
    ambiguity_threshold: 0.1

# ================= POLICIES =================

policies:
  # ================= RULE CONTROL =================
  - name: RulePolicy
    core_fallback_threshold: 0.3
    core_fallback_action_name: action_fallback
    enable_fallback_prediction: true

  # ================= CONTEXTUAL LEARNING =================
  - name: TEDPolicy
    max_history: 10
    epochs: 150
    constrain_similarities: true

  # ================= MEMORY =================
  - name: MemoizationPolicy
    max_history: 6
