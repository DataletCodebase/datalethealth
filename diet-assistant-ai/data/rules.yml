version: "3.1"

rules:
  # ================= START =================
  - rule: Greet → time based start
    steps:
      - intent: greet
      - action: action_ask_meal_by_time

  # ================= FOOD FLOW =================
  - rule: User ate food
    steps:
      - intent: ask_food
      - action: action_food_analysis

  - rule: User skipped meal
    steps:
      - intent: skip_meal
      - action: action_skip_meal

  # ================= PROFILE FLOW =================

  - rule: Collect weight
    condition:
      - slot_was_set:
          - conversation_mode: ask_weight
    steps:
      - intent: provide_weight
      - action: action_collect_weight

  - rule: Collect height
    condition:
      - slot_was_set:
          - conversation_mode: ask_height
    steps:
      - intent: provide_height
      - action: action_collect_height

  - rule: Collect medical
    condition:
      - slot_was_set:
          - conversation_mode: ask_medical
    steps:
      - intent: provide_medical
      - action: action_medical_awareness

  # ================= AFTER MEDICAL =================

  - rule: User wants diet tips
    condition:
      - slot_was_set:
          - conversation_mode: awareness_done
    steps:
      - intent: affirm
      - action: action_diet_suggestion

  - rule: User denies diet tips
    condition:
      - slot_was_set:
          - conversation_mode: awareness_done
    steps:
      - intent: deny
      - action: action_fallback

  # ================= INTERRUPTS =================

  - rule: General chat interrupt
    steps:
      - intent: random_chat
      - action: action_general_answer

  - rule: Diet request interrupt
    steps:
      - intent: ask_diet_plan
      - action: action_diet_suggestion

  - rule: Summary interrupt
    steps:
      - intent: meal_summary
      - action: action_meal_summary

  # ================= FALLBACK =================

  - rule: Global fallback
    steps:
      - intent: nlu_fallback
      - action: action_fallback

  # ================= SMALL =================

  - rule: Thanks
    steps:
      - intent: thanks
      - action: utter_thanks

  - rule: Goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye
