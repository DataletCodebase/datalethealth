version: "3.1"

stories:
  # ================= FULL IDEAL FLOW =================
  - story: full meal flow with tips
    steps:
      - intent: ask_food
      - action: action_food_analysis
      - intent: provide_weight
      - action: action_collect_weight
      - intent: provide_height
      - action: action_collect_height
      - intent: provide_medical
      - action: action_medical_awareness
      - intent: affirm
      - action: action_diet_suggestion

  # ================= DENY TIPS =================
  - story: full meal flow deny tips
    steps:
      - intent: ask_food
      - action: action_food_analysis
      - intent: provide_weight
      - action: action_collect_weight
      - intent: provide_height
      - action: action_collect_height
      - intent: provide_medical
      - action: action_medical_awareness
      - intent: deny
      - action: action_fallback

  # ================= SKIP → THEN EAT =================
  - story: skip then later eat
    steps:
      - intent: skip_meal
      - action: action_skip_meal
      - intent: ask_food
      - action: action_food_analysis

  # ================= INTERRUPT FLOW =================
  - story: interrupt with general chat during flow
    steps:
      - intent: ask_food
      - action: action_food_analysis
      - intent: random_chat
      - action: action_general_answer
      - intent: provide_weight
      - action: action_collect_weight

  # ================= GENERAL → DIET =================
  - story: general question then meal
    steps:
      - intent: random_chat
      - action: action_general_answer
      - intent: ask_food
      - action: action_food_analysis

  # ================= DIRECT PROFILE INPUT =================

  - story: user directly gives weight
    steps:
      - intent: provide_weight
      - action: action_collect_weight

  - story: user directly gives height
    steps:
      - intent: provide_height
      - action: action_collect_height

  - story: user directly gives medical info
    steps:
      - intent: provide_medical
      - action: action_medical_awareness

  # ================= PARTIAL FLOW RECOVERY =================

  - story: user gives weight after food
    steps:
      - intent: ask_food
      - action: action_food_analysis
      - intent: provide_weight
      - action: action_collect_weight

  - story: user gives height after weight
    steps:
      - intent: provide_weight
      - action: action_collect_weight
      - intent: provide_height
      - action: action_collect_height

  - story: user gives medical after height
    steps:
      - intent: provide_height
      - action: action_collect_height
      - intent: provide_medical
      - action: action_medical_awareness

  # ================= RANDOM INTERRUPT ANYTIME =================

  - story: interrupt anytime with random chat
    steps:
      - intent: random_chat
      - action: action_general_answer

  - story: interrupt anytime with diet request
    steps:
      - intent: ask_diet_plan
      - action: action_diet_suggestion

  - story: interrupt anytime with summary
    steps:
      - intent: meal_summary
      - action: action_meal_summary

  # ================= FALLBACK RECOVERY =================

  - story: fallback then recover
    steps:
      - intent: nlu_fallback
      - action: action_fallback
      - intent: ask_food
      - action: action_food_analysis

  # ================= SMALL FLOWS =================

  - story: user thanks
    steps:
      - intent: thanks
      - action: utter_thanks

  - story: user goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye
