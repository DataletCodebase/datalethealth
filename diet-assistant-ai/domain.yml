version: "3.1"

intents:
  - greet
  - ask_food
  - skip_meal
  - provide_weight
  - provide_height
  - provide_medical
  - affirm
  - deny
  - ask_diet_plan
  - meal_summary
  - random_chat
  - thanks
  - goodbye
  - nlu_fallback

# ================= SLOTS =================
slots:
  conversation_mode:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  daily_calorie:
    type: float
    influence_conversation: false
    initial_value: 0
    mappings:
      - type: custom

  body_weight:
    type: float
    influence_conversation: true
    mappings:
      - type: custom

  height:
    type: float
    influence_conversation: true
    mappings:
      - type: custom

  medical_condition:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

# ================= RESPONSES =================
responses:
  utter_goodbye:
    - text: |
        Take care 🙂 
        Stay healthy and keep tracking your meals!

  utter_thanks:
    - text: |
        Happy to help 🙂
        Keep up the healthy habits!

  utter_default:
    - text: |
        Hmm 🤔 I didn’t get that clearly.
        Can you say it again in a simple way?

  utter_encourage:
    - text: |
        You're doing great 💪
        Small steps make big results!

# ================= ACTIONS =================
actions:
  - action_ask_meal_by_time
  - action_food_analysis
  - action_collect_weight
  - action_collect_height
  - action_medical_awareness
  - action_diet_suggestion
  - action_skip_meal
  - action_general_answer
  - action_meal_summary
  - action_fallback

# ================= SESSION =================
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
